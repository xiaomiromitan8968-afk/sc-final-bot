<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sening kuning bilan, Azizam!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #1a000d;
            --soft-pink: #ffb3d1;
            --glow: 0 0 20px rgba(255, 77, 148, 0.5);
        }

        body {
            margin: 0; background: var(--dark);
            font-family: 'Montserrat', sans-serif;
            color: white; overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Fon animatsiyasi */
        .stars {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: radial-gradient(circle at center, #2b001a 0%, #000 100%);
        }

        /* Bosh sahifa */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; padding: 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem; color: var(--pink);
            text-shadow: 0 0 15px var(--pink);
            margin: 0; animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .counter-box {
            margin: 30px 0; padding: 20px;
            background: rgba(255, 77, 148, 0.1);
            border-radius: 20px; border: 1px solid rgba(255, 77, 148, 0.3);
            backdrop-filter: blur(5px);
        }

        #love-counter {
            font-size: 1.1rem; color: var(--soft-pink); font-weight: 600;
        }

        .start-btn {
            padding: 15px 35px; background: var(--pink);
            border: none; border-radius: 50px;
            color: white; font-weight: bold; font-size: 1rem;
            cursor: pointer; box-shadow: var(--glow);
            transition: 0.3s;
        }

        .start-btn:active { transform: scale(0.9); }

        /* Timeline */
        .timeline { position: relative; max-width: 600px; margin: 50px auto; padding: 20px; }
        .timeline::after {
            content: ''; position: absolute; width: 2px;
            background: var(--pink); top: 0; bottom: 0; left: 50%;
        }

        .container {
            padding: 10px 30px; position: relative; width: 50%;
            box-sizing: border-box; opacity: 0; transform: translateY(30px);
            transition: 1s all ease;
        }
        .container.show { opacity: 1; transform: translateY(0); }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }

        .content {
            padding: 15px; background: rgba(255, 77, 148, 0.05);
            border: 1px solid rgba(255, 77, 148, 0.2); border-radius: 20px;
        }
        .content img {
            width: 100%; border-radius: 15px; border: 1px solid var(--pink);
        }

        @media (max-width: 600px) {
            .timeline::after { left: 31px; }
            .container { width: 100%; padding-left: 70px; text-align: left; }
            .right { left: 0; }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <section class="hero" id="hero">
        <h1>Happy Birthday!</h1>
        <p style="color: var(--soft-pink); margin-top: 10px;">"Ah canim Sevgilim..." ❤️</p>
        
        <div class="counter-box">
            <p style="font-size: 0.8rem; margin-bottom: 5px; opacity: 0.8;">Biz birga bo'lganimizga:</p>
            <div id="love-counter">Yuklanmoqda...</div>
        </div>
        
        <button class="start-btn" onclick="initSurprise()">🎁 Sovg'ani ochish</button>
    </section>

    <div class="timeline" id="memories" style="display: none;">
        <div class="container left animate-box">
            <div class="content">
                <img src="rasm1.jpg" alt="1">
                <h3>Sening kulgung...</h3>
                <p>Dunyoni yoritadi.</p>
            </div>
        </div>
        <div class="container right animate-box">
            <div class="content">
                <img src="rasm2.jpg" alt="2">
                <h3>Baxtimiz...</h3>
                <p>Doimiy bo'lsin.</p>
            </div>
        </div>
    </div>

    <script>
        function updateCounter() {
            const startDate = new Date(2025, 7, 5); // SANANI O'ZGARTIRING
            const now = new Date();
            const diff = now - startDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);
            document.getElementById('love-counter').innerHTML = `${days} kun, ${hours} soat, ${mins}:${secs}`;
        }
        setInterval(updateCounter, 1000);

        function initSurprise() {
            // Musiqani boshlash
            const music = document.getElementById('bgMusic');
            music.volume = 0.5;
            music.play();

            // Timeline'ni ko'rsatish va scroll qilish
            document.getElementById('memories').style.display = 'block';
            setTimeout(() => {
                window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
            }, 100);
        }

        window.addEventListener('scroll', () => {
            const boxes = document.querySelectorAll('.animate-box');
            boxes.forEach(box => {
                if(box.getBoundingClientRect().top < window.innerHeight * 0.8) {
                    box.classList.add('show');
                }
            });
        });
        updateCounter();
    </script>
</body>
</html>
