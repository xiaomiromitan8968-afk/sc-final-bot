<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ism Yozish va Olov Effekti</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            touch-action: none; /* Ekranni surishni to'xtatish */
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
        }
        /* Tugmalar uchun dizayn */
        .controls {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            pointer-events: none; /* Tugmalardan tashqari joy bosilishi uchun */
        }
        button {
            pointer-events: auto; /* Tugmalarni bosish mumkin qilish */
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.1s;
            color: white;
        }
        button:active {
            transform: scale(0.95);
        }
        #btnBlue {
            background-color: #007bff;
            box-shadow: 0 0 15px #007bff;
        }
        #btnRed {
            background-color: #ff3300;
            box-shadow: 0 0 15px #ff3300;
        }
    </style>
</head>
<body>

<div class="controls">
    <button id="btnBlue">Ism Yozish</button>
    <button id="btnRed">Olov Yoqish</button>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    const fireColors = ['#ff0000', '#ff5a00', '#ff9a00', '#ffce00', '#ffe808'];
    let currentName = "DOLIYA";
    let isFireModeActive = false; // Qizil tugma bosilganda yozishni boshlaydi

    // Zarracha (Particle) obyekti
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 3;
            this.solid = true;
            this.color = '#777'; // Boshlang'ich kulrang rang
            this.vx = 0;
            this.vy = 0;
            this.gravity = 0.2;
            this.alpha = 1;
        }

        update() {
            if (!this.solid) {
                this.x += this.vx;
                this.vy += this.gravity;
                this.y += this.vy;
                this.alpha -= 0.015; // Sekin yo'qolib borishi
            }
        }

        draw() {
            if (this.alpha <= 0) return;
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    // Yozuvni zarrachalarga aylantirish
    function initParticles(text) {
        particles = [];
        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d');
        textCanvas.width = canvas.width;
        textCanvas.height = canvas.height;

        // Ism uzunligiga qarab harf hajmini moslash
        let fontSize = canvas.width / (text.length * 0.6);
        if (fontSize > 150) fontSize = 150; 
        
        textCtx.fillStyle = "white";
        textCtx.font = `bold ${fontSize}px Arial`;
        textCtx.textAlign = "center";
        textCtx.textBaseline = "middle";

        // Yozuvni gorizontal qilib o'rtaga joylashtiramiz
        textCtx.fillText(text.toUpperCase(), textCanvas.width / 2, textCanvas.height / 2 - 50);

        const imgData = textCtx.getImageData(0, 0, textCanvas.width, textCanvas.height).data;

        for (let y = 0; y < textCanvas.height; y += 4) {
            for (let x = 0; x < textCanvas.width; x += 4) {
                const index = (y * textCanvas.width + x) * 4;
                const alpha = imgData[index + 3];
                
                if (alpha > 128) {
                    particles.push(new Particle(x, y));
                }
            }
        }
    }

    // Portlash (Olov) effekti x, y koordinatalarida
    function explode(hitX, hitY) {
        const explosionRadius = 40; // Teggan joyda qancha maydon yonishi

        particles.forEach(p => {
            if (p.solid) {
                const dx = p.x - hitX;
                const dy = p.y - hitY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < explosionRadius) {
                    p.solid = false;
                    p.color = fireColors[Math.floor(Math.random() * fireColors.length)];
                    p.vx = (Math.random() - 0.5) * 8; // Ikki yonga sochilish
                    p.vy = (Math.random() - 1) * 6;   // Tepaga qarab otilish va pastga tushish
                }
            }
        });
    }

    // Sichqoncha yoki barmoq bilan teginganda
    function handleTouch(e) {
        if (!isFireModeActive) return; // Faqat qizil tugma yoqiq bo'lsa ishlaydi

        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let clientY = e.touches ? e.touches[0].clientY : e.clientY;
        explode(clientX, clientY);
    }

    // Ekran bosilganda yoki ustida harakatlantirilganda yonishi uchun
    window.addEventListener('pointerdown', handleTouch);
    window.addEventListener('pointermove', (e) => {
        // Sichqoncha bosib turilgan bo'lsa yoki telefonda surilsa
        if (e.buttons > 0 || e.touches) {
            handleTouch(e);
        }
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles(currentName);
    });

    // --- TUGMALAR UCHUN HODISALAR ---

    // 1. Ko'k tugma (Ism o'zgartirish)
    document.getElementById('btnBlue').addEventListener('click', () => {
        const newName = prompt("Yangi ism kiriting:");
        if (newName && newName.trim() !== "") {
            currentName = newName.trim();
            initParticles(currentName); // Zarrachalarni yangi ism bilan qayta chizish
            isFireModeActive = false; // Yozuv yangilanganda olov rejimini o'chiramiz
            document.getElementById('btnRed').innerText = "Olov Yoqish";
            document.getElementById('btnRed').style.transform = "scale(1)";
        }
    });

    // 2. Qizil tugma (Olov rejimini yoqish)
    document.getElementById('btnRed').addEventListener('click', (e) => {
        isFireModeActive = true;
        e.target.innerText = "Yozuvni barmog'ingiz bilan kuydiring! 🔥";
        e.target.style.transform = "scale(1.05)"; // Tugma biroz kattalashadi
    });

    // Asosiy o'yin tsikli
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // O'chib ketgan zarrachalarni xotiradan tozalash
        particles = particles.filter(p => p.alpha > 0);

        requestAnimationFrame(animate);
    }

    // Ishga tushirish
    initParticles(currentName);
    animate();

</script>
</body>
</html>
