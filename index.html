<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Orbit Escape</title>
    <style>
        body { margin: 0; background: #0f172a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { background: #1e293b; box-shadow: 0 0 50px rgba(0,0,0,0.5); border-radius: 8px; }
        #info { position: absolute; top: 20px; color: #38bdf8; font-family: sans-serif; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h1 id="score">0</h1>
        <p>Sichqonchani bosing: Orbitani o'zgartirish</p>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = 400;
canvas.height = 400;

let score = 0;
let gameActive = true;
let angle = 0;
let orbitRadius = 80;
let targetRadius = 80;
let enemies = [];

// O'yinchi obyekti
const player = { x: 0, y: 0, size: 8 };

function spawnEnemy() {
    if (!gameActive) return;
    const speed = 2 + Math.random() * 2;
    const angle = Math.random() * Math.PI * 2;
    enemies.push({
        x: canvas.width / 2,
        y: canvas.height / 2,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: 6
    });
    setTimeout(spawnEnemy, 1000 - Math.min(score * 5, 700));
}

function update() {
    if (!gameActive) return;

    // Orbitani silliq o'zgartirish
    orbitRadius += (targetRadius - orbitRadius) * 0.1;
    angle += 0.05;

    player.x = canvas.width / 2 + Math.cos(angle) * orbitRadius;
    player.y = canvas.height / 2 + Math.sin(angle) * orbitRadius;

    enemies.forEach((enemy, index) => {
        enemy.x += enemy.vx;
        enemy.y += enemy.vy;

        // To'qnashuvni tekshirish
        const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
        if (dist < player.size + enemy.size) {
            gameActive = false;
            alert("O'yin tugadi! Ballingiz: " + score);
            location.reload();
        }

        // Ekranda chiqib ketgan dushmanlarni o'chirish
        if (enemy.x < 0 || enemy.x > canvas.width || enemy.y < 0 || enemy.y > canvas.height) {
            enemies.splice(index, 1);
            score++;
            scoreEl.innerText = score;
        }
    });
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Orbitani chizish
    ctx.strokeStyle = '#334155';
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 80, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 140, 0, Math.PI*2); ctx.stroke();

    // Dushmanlar
    ctx.fillStyle = '#f43f5e';
    enemies.forEach(e => {
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, Math.PI*2); ctx.fill();
    });

    // O'yinchi
    ctx.fillStyle = '#38bdf8';
    ctx.shadowBlur = 15; ctx.shadowColor = '#38bdf8';
    ctx.beginPath(); ctx.arc(player.x, player.y, player.size, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

window.addEventListener('mousedown', () => {
    targetRadius = (targetRadius === 80) ? 140 : 80;
});

spawnEnemy();
draw();
</script>
</body>
</html>
