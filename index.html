<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siz uchun maxsus 💙</title>
    <style>
        /* CSS - Tashqi ko'rinish */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #001f3f, #00050a); /* To'q ko'k gradient */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #e0f2ff;
        }

        /* Kirish ekrani (Autoplay cheklovini aylanib o'tish uchun) */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 1s ease-in-out;
        }

        .overlay button {
            padding: 15px 40px;
            font-size: 22px;
            background: transparent;
            color: #0074D9;
            border: 2px solid #0074D9;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #0074D9;
            transition: 0.3s;
        }

        .overlay button:hover {
            background: #0074D9;
            color: white;
            box-shadow: 0 0 30px #0074D9;
        }

        /* Asosiy kontent */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px #0074D9;
            animation: glow 2s ease-in-out infinite alternate;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #0074D9; }
            to { text-shadow: 0 0 30px #00a2ff, 0 0 10px #fff; }
        }

        /* Uchib yuruvchi ko'k atirgullar */
        .rose {
            position: absolute;
            top: -50px;
            font-size: 30px;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
            filter: drop-shadow(0 0 5px #0074D9);
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }

        /* Musiqa pleyeri (yashirin) */
        #bgMusic {
            display: none;
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay">
        <p style="margin-bottom: 20px;">Siz uchun kichik sovg'a...</p>
        <button onclick="startApp()">Ochish 🌹</button>
    </div>

    <div class="container">
        <div id="garden"></div>
        <div class="content">
            <h1>Sizni yaxshi ko'raman! 💙</h1>
            <p>Dunyodagi eng go'zal ko'k atirgullar faqat siz uchun...</p>
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="musiqa.mp3" type="audio/mpeg">
    </audio>

    <script>
        // JavaScript - Mantiq va Effektlar
        function startApp() {
            // 1. Kirish ekranini yo'qotish
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 1000);

            // 2. Musiqani chaldirish
            const music = document.getElementById('bgMusic');
            music.play().catch(error => {
                console.log("Musiqa ijrosida xatolik: ", error);
            });

            // 3. Atirgullar yomg'irini boshlash
            setInterval(createRose, 400);
        }

        function createRose() {
            const garden = document.getElementById('garden');
            const rose = document.createElement('div');
            rose.classList.add('rose');
            
            // Ko'k atirgullar va yuraklar aralashmasi
            const items = ['💙', '🌹', '🦋'];
            rose.innerText = items[Math.floor(Math.random() * items.length)];
            
            // Tasodifiy joylashuv va tezlik
            rose.style.left = Math.random() * 100 + 'vw';
            rose.style.animationDuration = Math.random() * 3 + 4 + 's'; // 4-7 soniya orasida tushadi
            rose.style.opacity = Math.random() * 0.5 + 0.5;
            rose.style.fontSize = Math.random() * 20 + 20 + 'px';

            garden.appendChild(rose);

            // Xotirani to'ldirmaslik uchun tushib bo'lganlarini o'chirish
            setTimeout(() => {
                rose.remove();
            }, 7000);
        }
    </script>
</body>
</html>
