<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sening kuning bilan, Azizam!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #ff4d94;
            --dark: #1a000d;
            --soft-pink: #ffb3d1;
        }
        body {
            margin: 0; background: var(--dark);
            font-family: 'Montserrat', sans-serif;
            color: white; overflow-x: hidden;
        }
        
        /* Bosh sahifa */
        .hero {
            height: 100vh;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center; position: relative;
        }
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 4rem; color: var(--pink);
            text-shadow: 0 0 20px var(--pink);
            margin: 0; padding: 0 10px;
        }

        /* Sekundomer */
        .counter-box {
            margin: 30px 20px; padding: 20px;
            background: rgba(255, 77, 148, 0.1);
            border-radius: 25px; border: 1px solid rgba(255, 77, 148, 0.3);
            text-align: center;
        }
        #love-counter {
            font-size: 1.2rem; font-weight: 600; color: var(--soft-pink);
        }

        /* Timeline */
        .timeline { position: relative; max-width: 800px; margin: 20px auto; padding: 20px; }
        .timeline::after {
            content: ''; position: absolute; width: 2px;
            background: var(--pink); top: 0; bottom: 0; left: 50%;
        }
        .container {
            padding: 10px 30px; position: relative; width: 50%;
            box-sizing: border-box; opacity: 0; transform: translateY(30px);
            transition: 0.8s all ease;
        }
        .container.show { opacity: 1; transform: translateY(0); }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }
        
        .content {
            padding: 15px; background: rgba(255, 77, 148, 0.05);
            border: 1px solid rgba(255, 77, 148, 0.2);
            border-radius: 20px;
        }
        .content img {
            width: 100%; border-radius: 15px;
            margin-bottom: 10px; border: 1px solid var(--pink);
        }

        @media screen and (max-width: 600px) {
            .timeline::after { left: 31px; }
            .container { width: 100%; padding-left: 70px; padding-right: 20px; text-align: left; }
            .right { left: 0; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Happy Birthday!</h1>
        <p>Sen hayotimdagi eng go'zal mo'jizasan ❤️</p>
        
        <div class="counter-box">
            <p style="margin-bottom: 10px; font-size: 0.9rem;">Biz birga bo'lgan vaqt:</p>
            <div id="love-counter">Yuklanmoqda...</div>
        </div>
        
        <div style="margin-top: 20px; font-size: 1.5rem; animation: bounce 2s infinite;">👇</div>
    </section>

    <div class="timeline">
        <div class="container left animate-box">
            <div class="content">
                <img src="rasm1.jpg" alt="Xotira 1">
                <h3>Ilk uchrashuv</h3>
                <p>O'sha kundan boshlab hayotim nurga to'ldi.</p>
            </div>
        </div>

        <div class="container right animate-box">
            <div class="content">
                <img src="rasm2.jpg" alt="Xotira 2">
                <h3>Baxtli lahzalar</h3>
                <p>Sening kulgung - dunyodagi eng go'zal musiqa.</p>
            </div>
        </div>
    </div>

    <script>
        // Sekundomer funksiyasi
        function updateCounter() {
            // SHU YERGA TANISHGAN SANANGIZNI YOZING: Yil, Oy (0-11), Kun
            const startDate = new Date(2023, 5, 15); 
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('love-counter').innerHTML = 
                `${days} kun, ${hours} soat, ${mins} daqiqa, ${secs} soniya`;
        }
        setInterval(updateCounter, 1000);

        // Scroll animatsiyasi
        window.addEventListener('scroll', () => {
            const boxes = document.querySelectorAll('.animate-box');
            boxes.forEach(box => {
                if(box.getBoundingClientRect().top < window.innerHeight / 5 * 4) {
                    box.classList.add('show');
                }
            });
        });
        updateCounter();
    </script>
</body>
</html>
