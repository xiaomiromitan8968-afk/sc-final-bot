<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jonli O'rmon</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #forest-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #forest-img {
            height: 110%; /* Parallaks uchun biroz kattaroq */
            position: absolute;
            transition: transform 0.1s ease-out;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="forest-container">
    <img id="forest-img" src="1000010032.jpg" alt="Forest">
    <canvas id="effectsCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('effectsCanvas');
    const ctx = canvas.getContext('2d');
    const img = document.getElementById('forest-img');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // Barglar yoki zarrachalar yaratish
    let particles = [];
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 3 + 1,
            speedX: Math.random() * 1 - 0.5,
            speedY: Math.random() * 0.5 + 0.2,
            opacity: Math.random()
        });
    }

    function drawParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Quyosh nuri effekti (Glow)
        ctx.fillStyle = "rgba(255, 255, 200, 0.05)";
        ctx.beginPath();
        ctx.arc(canvas.width * 0.7, 0, 300, 0, Math.PI * 2);
        ctx.fill();

        // Barglar harakati
        ctx.fillStyle = "rgba(120, 180, 50, 0.6)";
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
            ctx.fill();

            p.x += p.speedX;
            p.y += p.speedY;

            if (p.y > canvas.height) p.y = -10;
            if (p.x > canvas.width) p.x = 0;
        });

        requestAnimationFrame(drawParticles);
    }

    // Telefon harakatiga qarab rasmni siljitish (Parallaks)
    window.addEventListener('deviceorientation', (event) => {
        let x = event.gamma; // -90 dan 90 gacha
        let y = event.beta;  // -180 dan 180 gacha

        // Rasmni yumshoq siljitish
        img.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px) scale(1.1)`;
    });

    // Agar telefonda giroskop ishlamasa, sichqoncha/touch bilan ham ishlaydi
    window.addEventListener('mousemove', (e) => {
        let moveX = (e.clientX - window.innerWidth / 2) * 0.02;
        let moveY = (e.clientY - window.innerHeight / 2) * 0.02;
        img.style.transform = `translate(${moveX}px, ${moveY}px) scale(1.1)`;
    });

    drawParticles();
</script>

</body>
</html>
