<!DOCTYPE html>
<html>
<head>
    <title>3D Runner Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #score { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-size: 30px; }
    </style>
</head>
<body>
    <div id="score">Score: 0</div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // 1. Sahnani sozlash
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Chiroq (Soya va ranglar uchun)
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 5, 5).addTo(scene);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. O'yinchi (Kichik kub)
        const playerGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ff00 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.3;
        scene.add(player);

        // 4. Yo'l (Zamin)
        const floorGeo = new THREE.PlaneGeometry(10, 1000);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        camera.position.set(0, 2, 5);
        camera.lookAt(player.position);

        // 5. To'siqlar
        let obstacles = [];
        function spawnObstacle() {
            const obsGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const obs = new THREE.Mesh(obsGeo, obsMat);
            obs.position.set((Math.random() - 0.5) * 8, 0.4, -50);
            scene.add(obs);
            obstacles.push(obs);
        }
        setInterval(spawnObstacle, 1000);

        // 6. Boshqaruv
        let targetX = 0;
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') targetX -= 1.5;
            if (e.key === 'ArrowRight') targetX += 1.5;
        });

        // 7. O'yin aylanishi (Animation Loop)
        let score = 0;
        function animate() {
            requestAnimationFrame(animate);

            // O'yinchi harakati
            player.position.x += (targetX - player.position.x) * 0.1;
            
            // To'siqlarni harakatlantirish
            obstacles.forEach((obs, index) => {
                obs.position.z += 0.5; // Tezlik

                // To'qnashuvni tekshirish
                const dist = player.position.distanceTo(obs.position);
                if (dist < 0.8) {
                    alert("O'yin tugadi! Score: " + score);
                    location.reload();
                }

                // O'tib ketgan to'siqlarni o'chirish
                if (obs.position.z > 5) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                    score++;
                    document.getElementById('score').innerText = "Score: " + score;
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // Ekran o'zgarganda moslashish
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
