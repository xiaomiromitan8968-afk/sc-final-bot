<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Car 3D Showroom</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 10; }
        button { 
            padding: 12px; border: 1px solid #fff; background: rgba(255,255,255,0.1); 
            color: white; border-radius: 5px; cursor: pointer;
        }
        #info { position: absolute; top: 20px; width: 100%; text-align: center; color: #555; pointer-events: none; }
    </style>
</head>
<body>

    <div id="info">360° Aylantirish uchun suring</div>
    <div id="ui">
        <button onclick="changeColor(0xff0000)">Qizil</button>
        <button onclick="changeColor(0x00ffcc)">Neon Blue</button>
        <button onclick="changeColor(0xffd700)">Oltin</button>
        <button onclick="toggleLights()">Chiroqlar</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, carBody, headlights = [];
        let isLightOn = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Chiroqlar (Atmosfera uchun)
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);

            const pointLight = new THREE.PointLight(0xffffff, 1);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // MASHINA MODELINI QURAMIZ (Prototip)
            const carGroup = new THREE.Group();

            // Korpus (Body)
            const bodyGeo = new THREE.BoxGeometry(2.5, 0.6, 1.2);
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc, shininess: 100 });
            carBody = new THREE.Mesh(bodyGeo, bodyMat);
            carGroup.add(carBody);

            // Kabina (Top)
            const topGeo = new THREE.BoxGeometry(1.2, 0.4, 1.0);
            const top = new THREE.Mesh(topGeo, bodyMat);
            top.position.set(-0.2, 0.5, 0);
            carGroup.add(top);

            // G'ildiraklar (Wheels)
            const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 32);
            const wheelMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            
            const wheelPositions = [
                [0.8, -0.3, 0.6], [0.8, -0.3, -0.6],
                [-0.8, -0.3, 0.6], [-0.8, -0.3, -0.6]
            ];

            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeo, wheelMat);
                wheel.rotation.x = Math.PI / 2;
                wheel.position.set(...pos);
                carGroup.add(wheel);
            });

            // Chiroqlar (Headlights)
            const lightGeo = new THREE.CircleGeometry(0.15, 16);
            const lightMat = new THREE.MeshBasicMaterial({ color: 0x111111 }); // O'chiq holat
            
            [ [1.26, 0, 0.4], [1.26, 0, -0.4] ].forEach(pos => {
                const light = new THREE.Mesh(lightGeo, lightMat.clone());
                light.rotation.y = Math.PI / 2;
                light.position.set(...pos);
                headlights.push(light);
                carGroup.add(light);
            });

            scene.add(carGroup);
            this.carGroup = carGroup;

            animate();
        }

        // Rangni o'zgartirish
        function changeColor(hex) {
            carBody.material.color.setHex(hex);
            carBody.parent.children[1].material.color.setHex(hex); // Kabina rangi
        }

        // Chiroqlarni yoqish
        function toggleLights() {
            isLightOn = !isLightOn;
            headlights.forEach(light => {
                light.material.color.setHex(isLightOn ? 0xffffaa : 0x111111);
            });
        }

        // Boshqaruv (Touch & Mouse)
        let isDragging = false;
        let previousMouseX = 0;

        window.addEventListener('touchstart', (e) => { isDragging = true; previousMouseX = e.touches[0].clientX; });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaX = e.touches[0].clientX - previousMouseX;
                carGroup.rotation.y += deltaX * 0.01;
                previousMouseX = e.touches[0].clientX;
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
