<!DOCTYPE html>
<html>
<head>
    <title>3D Real World Simulation</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Boshqaruv:</b> W,A,S,D - Yurish | Sichqoncha - Atrofga qarash<br>
        <i>Dunyoga xush kelibsiz! Bu yerda boshqa personajlar ham bor.</i>
    </div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // 1. SAHNA VA KAMERA
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB); // Moviy osmon
    scene.fog = new THREE.Fog(0x87CEEB, 0, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // Soyalar yoqildi
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);
    document.body.addEventListener('click', () => controls.lock());

    // 2. YORUG'LIK (Realizm asosi)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5);
    scene.add(hemiLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1);
    sunLight.position.set(10, 20, 10);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // 3. YER (Grass - O'tloq)
    const floorGeo = new THREE.PlaneGeometry(100, 100);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d5e1e });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 4. PERSONAJ YARATISH (NPC)
    const npcs = [];
    function createPerson(x, z, color) {
        const person = new THREE.Group();
        
        // Tana
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.25, 0.5, 4, 8), new THREE.MeshStandardMaterial({color: color}));
        body.position.y = 0.75;
        body.castShadow = true;
        person.add(body);

        // Bosh
        const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        head.position.y = 1.3;
        head.castShadow = true;
        person.add(head);

        person.position.set(x, 0, z);
        scene.add(person);
        npcs.push({ mesh: person, speed: Math.random() * 0.02 + 0.01 });
    }

    // Dunyoga 10 ta turli xil odamlarni qo'shamiz
    for(let i=0; i<15; i++) {
        createPerson(Math.random()*40-20, Math.random()*40-20, Math.random() * 0xffffff);
    }

    // 5. DARAXTLAR
    function createTree(x, z) {
        const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 1), new THREE.MeshStandardMaterial({color: 0x4d2902}));
        const leaves = new THREE.Mesh(new THREE.ConeGeometry(0.6, 1.5, 8), new THREE.MeshStandardMaterial({color: 0x1a4a1a}));
        trunk.position.set(x, 0.5, z);
        leaves.position.set(x, 1.5, z);
        trunk.castShadow = true;
        scene.add(trunk, leaves);
    }

    for(let i=0; i<30; i++) {
        createTree(Math.random()*60-30, Math.random()*60-30);
    }

    // 6. HARAKAT
    let keys = {};
    document.addEventListener('keydown', (e) => keys[e.code] = true);
    document.addEventListener('keyup', (e) => keys[e.code] = false);

    camera.position.set(0, 1.6, 5);

    function animate() {
        requestAnimationFrame(animate);

        if (controls.isLocked) {
            // O'yinchi harakati
            const speed = 0.1;
            if(keys['KeyW']) controls.moveForward(speed);
            if(keys['KeyS']) controls.moveForward(-speed);
            if(keys['KeyA']) controls.moveRight(-speed);
            if(keys['KeyD']) controls.moveRight(speed);

            // NPC harakati (Odamlar o'zicha yurib yuradi)
            npcs.forEach(npc => {
                npc.mesh.position.z += npc.speed;
                if(npc.mesh.position.z > 20) npc.mesh.position.z = -20;
            });
        }

        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
