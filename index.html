<!DOCTYPE html>
<html>
<head>
    <title>3D Rubik Cube - Yig'ish Imkoniyati</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; color: white; font-family: sans-serif; }
        #ui { position: absolute; bottom: 20px; left: 20px; pointer-events: none; }
        kbd { background: #333; padding: 2px 6px; border-radius: 4px; border: 1px solid #555; }
    </style>
</head>
<body>
    <div id="ui">
        <p>Aylantirish uchun tugmalarni bosing: <br>
        <kbd>U</kbd> - Yuqori (Up) | <kbd>D</kbd> - Past (Down) | <kbd>L</kbd> - Chap (Left) | <kbd>R</kbd> - O'ng (Right)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(5, 5, 5);
        controls.update();

        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        // Kub bo'lakchalarini saqlash uchun massiv
        const pieces = [];

        function createCube() {
            const colors = [0xff0000, 0xffa500, 0xffffff, 0xffff00, 0x00ff00, 0x0000ff];
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
                        const materials = colors.map(c => new THREE.MeshLambertMaterial({ color: c }));
                        const mesh = new THREE.Mesh(geometry, materials);
                        mesh.position.set(x, y, z);
                        scene.add(mesh);
                        pieces.push(mesh);
                    }
                }
            }
        }
        createCube();

        // Aylantirish mantiqi
        function rotateLayer(axis, layerValue) {
            const group = new THREE.Group();
            scene.add(group);

            // Tanlangan qatlamdagi bo'lakchalarni aniqlash
            const layerPieces = pieces.filter(p => {
                const pos = new THREE.Vector3();
                p.getWorldPosition(pos);
                return Math.round(pos[axis]) === layerValue;
            });

            layerPieces.forEach(p => group.attach(p));

            // Animatsiya (soddalashtirilgan)
            const rotationAxis = new THREE.Vector3();
            rotationAxis[axis] = 1;
            group.rotateOnAxis(rotationAxis, Math.PI / 2);

            // Guruhdan chiqarish va sahnaga qaytarish
            group.updateMatrixWorld();
            layerPieces.forEach(p => {
                scene.attach(p);
            });
            scene.remove(group);
        }

        // Klaviatura hodisalari
        window.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            if (key === 'U') rotateLayer('y', 1);  // Yuqori qatlam
            if (key === 'D') rotateLayer('y', -1); // Pastki qatlam
            if (key === 'L') rotateLayer('x', -1); // Chap qatlam
            if (key === 'R') rotateLayer('x', 1);  // O'ng qatlam
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
