<!DOCTYPE html>
<html>
<head>
    <title>Interaktiv 3D Kub</title>
    <style>
        body { margin: 0; background: #050505; }
        canvas { display: block; }
        #info {
            position: absolute; top: 10px; width: 100%;
            text-align: center; color: white; font-family: sans-serif;
        }
    </style>
</head>
<body>
    <div id="info">Sichqoncha bilan aylantiring</div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Sahna
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Kontrol (Sichqoncha bilan boshqarish)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 3. Kub yaratish funksiyasi
        function createPiece(x, y, z) {
            const geometry = new THREE.BoxGeometry(0.95, 0.95, 0.95);
            const materials = [
                new THREE.MeshLambertMaterial({color: 0xff0000}), // O'ng (Qizil)
                new THREE.MeshLambertMaterial({color: 0xffa500}), // Chap (To'q sariq)
                new THREE.MeshLambertMaterial({color: 0xffffff}), // Yuqori (Oq)
                new THREE.MeshLambertMaterial({color: 0xffff00}), // Past (Sariq)
                new THREE.MeshLambertMaterial({color: 0x00ff00}), // Oldi (Yashil)
                new THREE.MeshLambertMaterial({color: 0x0000ff})  // Orqa (Ko'k)
            ];
            const mesh = new THREE.Mesh(geometry, materials);
            mesh.position.set(x, y, z);
            return mesh;
        }

        const cubeGroup = new THREE.Group();
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    const piece = createPiece(x, y, z);
                    cubeGroup.add(piece);
                }
            }
        }
        scene.add(cubeGroup);

        // 4. Yorug'lik
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0x404040, 2));

        camera.position.z = 6;

        // 5. Animatsiya
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
