<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Sniper Pro Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; cursor: crosshair; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #00ff00; font-family: 'Courier New', monospace;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SCORE: <span id="score">0</span></h1>
        <p>Masofa: <span id="dist">450</span>m</p>
        <p>Shamol: <span id="wind">2.4</span> m/s</p>
    </div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let mouse = { x: 0, y: 0 };
let target = { x: 100, y: 100, r: 30, dx: 2, dy: 2 };

// Nishon harakati
function updateTarget() {
    target.x += target.dx;
    target.y += target.dy;

    if (target.x + target.r > canvas.width || target.x - target.r < 0) target.dx *= -1;
    if (target.y + target.r > canvas.height || target.y - target.r < 0) target.dy *= -1;
}

// Snayper durbini (Scope) chizish
function drawScope() {
    ctx.strokeStyle = '#00ff00';
    ctx.lineWidth = 2;
    
    // Tashqi aylana
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, 100, 0, Math.PI * 2);
    ctx.stroke();

    // Crosshair (Kesishgan chiziqlar)
    ctx.beginPath();
    ctx.moveTo(mouse.x - 120, mouse.y);
    ctx.lineTo(mouse.x + 120, mouse.y);
    ctx.moveTo(mouse.x, mouse.y - 120);
    ctx.lineTo(mouse.x, mouse.y + 120);
    ctx.stroke();
}

function drawTarget() {
    ctx.fillStyle = 'red';
    ctx.beginPath();
    ctx.arc(target.x, target.y, target.r, 0, Math.PI * 2);
    ctx.fill();
    
    // Nishon ichidagi oq nuqta
    ctx.fillStyle = 'white';
    ctx.beginPath();
    ctx.arc(target.x, target.y, target.r / 3, 0, Math.PI * 2);
    ctx.fill();
}

function animate() {
    ctx.fillStyle = 'rgba(26, 26, 26, 0.3)'; // Silliq harakat effekti
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    updateTarget();
    drawTarget();
    drawScope();
    
    requestAnimationFrame(animate);
}

// Sichqoncha harakati
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// Otish mexanikasi
window.addEventListener('mousedown', () => {
    const dist = Math.hypot(mouse.x - target.x, mouse.y - target.y);
    
    if (dist < target.r) {
        score += 100;
        scoreEl.innerText = score;
        // Yangi nishon joylashuvi
        target.x = Math.random() * canvas.width;
        target.y = Math.random() * canvas.height;
        target.dx *= 1.1; // Tezlikni oshirish
    }
});

animate();
</script>
</body>
</html>
