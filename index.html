<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faqat Sen Uchun 💙</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            background: #00050a;
            font-family: 'Georgia', serif;
            color: #e0f2ff;
            cursor: crosshair;
        }

        /* Fon gradienti */
        .bg-glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            background: radial-gradient(circle, #001f3f 0%, #00050a 80%);
            z-index: -1;
        }

        /* Kirish ekrani */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: 1.5s;
        }

        .overlay button {
            padding: 15px 45px; font-size: 20px;
            background: transparent; color: #00a2ff;
            border: 1px solid #00a2ff; border-radius: 30px;
            cursor: pointer; box-shadow: 0 0 20px #004b8d;
        }

        /* Asosiy konteyner */
        .main-content {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh; text-align: center; padding: 20px;
        }

        #typewriter {
            font-size: 2.5rem; height: 1.2em;
            text-shadow: 0 0 15px #00a2ff;
            margin-bottom: 20px;
        }

        /* Taymer stili */
        .timer {
            background: rgba(0, 31, 63, 0.4);
            padding: 15px 25px; border-radius: 15px;
            border: 1px solid rgba(0, 162, 255, 0.3);
            font-size: 1.1rem; letter-spacing: 1px;
        }

        /* Effektlar */
        .particle {
            position: absolute; pointer-events: none;
            animation: fly 3s linear forwards;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) rotate(360deg); opacity: 0; }
        }

        .falling-rose {
            position: absolute; top: -50px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body onclick="createSparkle(event)">

    <div class="bg-glow"></div>

    <div class="overlay" id="overlay">
        <button onclick="startExperience()">Mening ko'k atirgulim uchun... 🌹</button>
    </div>

    <div class="main-content">
        <h1 id="typewriter"></h1>
        
        <div class="timer" id="timer">
            Biz birgamiz: <span id="days">0</span> kun, <span id="hours">0</span> soat...
        </div>

        <p style="margin-top: 30px; opacity: 0.6; font-style: italic;">
            (Ekranning istalgan joyiga bosing ✨)
        </p>
    </div>

    <audio id="bgMusic" loop>
        <source src="musiqa.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 1. Tanishgan sanangizni shu yerga yozing (Yil, Oy-1, Kun)
        // Masalan: 2023 yil 15-oktabr -> new Date(2023, 9, 15)
        const startDate = new Date(2023, 0, 1); 

        function startExperience() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 1500);
            
            document.getElementById('bgMusic').play();
            
            typeWriter("Seni dunyodagi hamma narsadan ko'proq yaxshi ko'raman! 💙");
            updateTimer();
            setInterval(updateTimer, 1000);
            setInterval(createFallingRose, 500);
        }

        // Typewriter effekti
        function typeWriter(text) {
            let i = 0;
            const elem = document.getElementById("typewriter");
            function type() {
                if (i < text.length) {
                    elem.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 100);
                }
            }
            type();
        }

        // Taymer funksiyasi
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours;
            document.getElementById("timer").innerHTML = 
                `Biz birgamiz: ${days} kun, ${hours} soat, ${mins} daqiqa, ${secs} soniya 💙`;
        }

        // Klik qilganda uchqunlar chiqishi
        function createSparkle(e) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.innerHTML = '✨';
                p.style.left = e.clientX + 'px';
                p.style.top = e.clientY + 'px';
                
                const vx = (Math.random() - 0.5) * 200;
                const vy = (Math.random() - 0.5) * 200;
                p.style.setProperty('--x', `${vx}px`);
                p.style.setProperty('--y', `${vy}px`);
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        // Tushayotgan atirgullar
        function createFallingRose() {
            const rose = document.createElement('div');
            rose.classList.add('falling-rose');
            rose.innerHTML = '💙';
            rose.style.left = Math.random() * 100 + 'vw';
            rose.style.fontSize = (Math.random() * 20 + 15) + 'px';
            rose.style.animationDuration = (Math.random() * 3 + 4) + 's';
            rose.style.opacity = Math.random();
            document.body.appendChild(rose);
            setTimeout(() => rose.remove(), 7000);
        }
    </script>
</body>
</html>
