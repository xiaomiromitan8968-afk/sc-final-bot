<!DOCTYPE html>
<html>
<head>
    <title>Real World with FBX Animation</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="ui">
        <b>Model yuklanmoqda...</b><br>
        Faylni (Catwalk Walk Turn 180 Tight.fbx) HTML bilan bir xil papkaga qo'ying.
    </div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa0a0a0);
    scene.fog = new THREE.Fog(0xa0a0a0, 10, 50);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 3, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Yorug'lik
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(0, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    // Yer
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ color: 0x999999 }));
    mesh.rotation.x = -Math.PI / 2;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // MIXER (Animatsiya boshqaruvchisi)
    let mixer;
    const clock = new THREE.Clock();

    // FBX MODELINI YUKLASH
    const loader = new FBXLoader();
    // DIQQAT: Fayl nomi siz yuborganingizdek bo'lishi kerak
    loader.load('Catwalk Walk Turn 180 Tight.fbx', (object) => {
        
        object.scale.set(0.01, 0.01, 0.01); // FBX odatda juda katta bo'ladi, kichraytiramiz
        object.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        // Animatsiyani yoqish
        mixer = new THREE.AnimationMixer(object);
        const action = mixer.clipAction(object.animations[0]);
        action.play();

        scene.add(object);
        document.getElementById('ui').innerHTML = "<b>Model yuklandi!</b><br>Personaj harakatlanmoqda.";
    }, 
    (xhr) => { console.log((xhr.loaded / xhr.total * 100) + '% yuklandi'); },
    (error) => { console.error('Xato yuz berdi:', error); });

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
