<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Sound Visualizer</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; }
        #btn { 
            z-index: 10; padding: 15px 30px; background: none; border: 2px solid #00f2ff; 
            color: #00f2ff; font-family: 'Courier New', monospace; cursor: pointer;
            border-radius: 50px; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 15px #00f2ff;
        }
    </style>
</head>
<body>

    <button id="btn">Tizimni yoqish</button>
    <canvas id="canvas"></canvas>

    <script>
        const btn = document.getElementById('btn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let audioCtx, analyser, source, dataArray;

        function setupAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            
            navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
                source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256; // To'lqin aniqligi
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                btn.style.display = 'none'; // Tugmani yashirish
                animate();
            }).catch(err => alert("Mikrofon ruxsati kerak: " + err));
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            analyser.getByteFrequencyData(dataArray);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 100;

            // Markaziy pulsatsiya (Jarvis ko'zi)
            let avg = dataArray.reduce((a, b) => a + b) / dataArray.length;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + avg * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0, 242, 255, ${avg / 255})`;
            ctx.lineWidth = 5;
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00f2ff";
            ctx.stroke();

            // Atrofdagi to'lqin chiziqlari
            for (let i = 0; i < dataArray.length; i++) {
                const barHeight = dataArray[i] * 1.2;
                const angle = (i * Math.PI * 2) / dataArray.length;
                
                const x1 = centerX + Math.cos(angle) * radius;
                const y1 = centerY + Math.sin(angle) * radius;
                const x2 = centerX + Math.cos(angle) * (radius + barHeight);
                const y2 = centerY + Math.sin(angle) * (radius + barHeight);

                ctx.strokeStyle = `hsl(${180 + i}, 100%, 50%)`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
            requestAnimationFrame(animate);
        }

        btn.addEventListener('click', () => {
            if (!audioCtx) setupAudio();
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
