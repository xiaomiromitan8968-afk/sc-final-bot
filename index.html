<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doliya Particle Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
            touch-action: none; /* Telefonda ekranni surishni to'xtatish uchun */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Ekranni to'liq egallash
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    let bullets = [];
    const fireColors = ['#ff0000', '#ff5a00', '#ff9a00', '#ffce00', '#ffe808'];

    // O'yinchi (Kema)
    const player = {
        x: canvas.width / 2,
        y: canvas.height - 50,
        width: 30,
        height: 40
    };

    // Sichqoncha yoki barmoq harakatini kuzatish
    function movePlayer(e) {
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        player.x = clientX;
    }
    window.addEventListener('mousemove', movePlayer);
    window.addEventListener('touchmove', movePlayer);
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        initParticles(); // Ekran o'zgarsa yozuvni qayta chizish
    });

    // Zarracha (Particle) obyekti
    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = 3;
            this.solid = true; // Boshida qattiq (kulrang)
            this.color = '#555'; // Yozuvning boshlang'ich rangi
            this.vx = 0;
            this.vy = 0;
            this.gravity = 0.2;
            this.alpha = 1;
        }

        update() {
            if (!this.solid) {
                // Agar parchalangan bo'lsa, olovga aylanib pastga tushadi
                this.x += this.vx;
                this.vy += this.gravity;
                this.y += this.vy;
                this.alpha -= 0.01; // Sekin yo'qolib boradi
            }
        }

        draw() {
            if (this.alpha <= 0) return;
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    // O'q obyekti
    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.speed = 10;
            this.radius = 3;
        }

        update() {
            this.y -= this.speed;
        }

        draw() {
            ctx.fillStyle = '#00ffcc'; // O'qning rangi
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Yozuvni zarrachalarga aylantirish funksiyasi
    function initParticles() {
        particles = [];
        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d');
        textCanvas.width = canvas.width;
        textCanvas.height = canvas.height;

        textCtx.fillStyle = "white";
        // Harflarni vertikal qilib yozish
        const word = ['D', 'O', 'L', 'I', 'Y', 'A'];
        
        // Ekranga qarab harf o'lchamini moslash
        let fontSize = canvas.width > 600 ? 120 : 80; 
        textCtx.font = `bold ${fontSize}px Arial`;
        textCtx.textAlign = "center";
        textCtx.textBaseline = "middle";

        let startY = 100;
        let spacing = fontSize * 0.85;

        for (let i = 0; i < word.length; i++) {
            textCtx.fillText(word[i], textCanvas.width / 2, startY + i * spacing);
        }

        const imgData = textCtx.getImageData(0, 0, textCanvas.width, textCanvas.height).data;

        // Har 4 pikselni tekshirib, qora bo'lmaganlarini zarrachaga aylantiramiz
        for (let y = 0; y < textCanvas.height; y += 4) {
            for (let x = 0; x < textCanvas.width; x += 4) {
                const index = (y * textCanvas.width + x) * 4;
                const alpha = imgData[index + 3]; // Shaffoflik darajasi
                
                if (alpha > 128) {
                    particles.push(new Particle(x, y));
                }
            }
        }
    }

    // Portlash effekti (O'q tekkanda)
    function explode(hitX, hitY) {
        const explosionRadius = 35; // Qancha maydon parchalanishi

        particles.forEach(p => {
            if (p.solid) {
                const dx = p.x - hitX;
                const dy = p.y - hitY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < explosionRadius) {
                    p.solid = false;
                    // Tasodifiy olov rangini beramiz
                    p.color = fireColors[Math.floor(Math.random() * fireColors.length)];
                    // Atrofga sochilish tezligi
                    p.vx = (Math.random() - 0.5) * 10;
                    p.vy = (Math.random() - 1) * 8; 
                }
            }
        });
    }

    let frameCount = 0;

    // Asosiy o'yin tsikli (Game Loop)
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Kemani chizish (Uchburchak)
        ctx.fillStyle = "yellow";
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - player.height / 2); // Uch qismi
        ctx.lineTo(player.x - player.width / 2, player.y + player.height / 2); // Chap qismi
        ctx.lineTo(player.x + player.width / 2, player.y + player.height / 2); // O'ng qismi
        ctx.fill();

        // Kema tagidan chiqadigan olov (thruster)
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.moveTo(player.x - 10, player.y + player.height / 2);
        ctx.lineTo(player.x + 10, player.y + player.height / 2);
        ctx.lineTo(player.x, player.y + player.height / 2 + Math.random() * 20 + 10);
        ctx.fill();

        // Har 7 kadrda bitta o'q otiladi
        if (frameCount % 7 === 0) {
            bullets.push(new Bullet(player.x, player.y - player.height / 2));
        }

        // Zarrachalarni chizish va yangilash
        particles.forEach(p => {
            p.update();
            p.draw();
        });

        // O'qlarni yangilash va teginishni (collision) tekshirish
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.update();
            b.draw();

            // O'q ekrandan chiqib ketsa o'chirish
            if (b.y < 0) {
                bullets.splice(i, 1);
                continue;
            }

            // O'q qattiq zarrachalarga tekkanini tekshirish
            let hit = false;
            for (let j = 0; j < particles.length; j++) {
                let p = particles[j];
                if (p.solid) {
                    const dx = b.x - p.x;
                    const dy = b.y - p.y;
                    if (Math.sqrt(dx * dx + dy * dy) < 10) { // Tegish radiusi
                        explode(b.x, b.y);
                        hit = true;
                        break; // Bitta o'q bitta joyni portlatadi
                    }
                }
            }

            if (hit) {
                bullets.splice(i, 1); // O'qni o'chirish
            }
        }

        // Xotirani tozalash uchun ko'rinmas zarrachalarni o'chirish
        particles = particles.filter(p => p.alpha > 0);

        frameCount++;
        requestAnimationFrame(animate);
    }

    // O'yinni boshlash
    initParticles();
    animate();

</script>
</body>
</html>
