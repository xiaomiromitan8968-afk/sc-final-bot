<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Magic for Her 💙</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00f2ff; --blue: #008cff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Montserrat', sans-serif; color: white; }

        /* VIDEO FON */
        #bg-video {
            position: fixed; top: 50%; left: 50%;
            min-width: 100%; min-height: 100%;
            width: auto; height: auto;
            z-index: -2; transform: translateX(-50%) translateY(-50%);
            filter: brightness(0.4) contrast(1.2);
            object-fit: cover;
        }

        /* 3D CANVAS */
        #canvas3d { position: fixed; top: 0; left: 0; z-index: -1; }

        .overlay {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
            background: rgba(0, 0, 0, 0.2); backdrop-filter: blur(2px);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 30px; padding: 30px;
            box-shadow: 0 0 30px rgba(0, 140, 255, 0.2);
            transform: perspective(1000px) rotateX(10deg);
            animation: float 4s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: perspective(1000px) rotateX(10deg) translateY(0); }
            50% { transform: perspective(1000px) rotateX(10deg) translateY(-20px); }
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 3.5rem; color: var(--cyan); text-shadow: 0 0 20px var(--blue); margin: 0; }
        
        .start-btn {
            margin-top: 30px; padding: 15px 40px;
            background: linear-gradient(45deg, var(--blue), var(--cyan));
            border: none; border-radius: 50px; color: white;
            font-weight: bold; cursor: pointer; box-shadow: 0 0 20px var(--blue);
            transition: 0.3s;
        }

        /* Video Popup uchun */
        .video-popup {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 80%; max-width: 400px;
            z-index: 1000; border: 2px solid var(--cyan); border-radius: 20px;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

    <canvas id="canvas3d"></canvas>

    <audio id="bgMusic" loop><source src="music.mp3" type="audio/mpeg"></audio>

    <div class="overlay" id="main-ui">
        <div class="glass-card">
            <h1>Mo'jizaga tayyormisiz?</h1>
            <p style="color: var(--cyan); margin-top: 15px;">Siz uchun maxsus 3D sayohat...</p>
            <button class="start-btn" onclick="startExperience()">3D Dunyoga kirish 💙</button>
        </div>
    </div>

    <div id="memory-video-box" class="video-popup">
        <video id="special-video" width="100%" style="border-radius: 18px;" controls>
            <source src="memory.mp4" type="video/mp4">
        </video>
        <button onclick="closeVideo()" style="width: 100%; margin-top: 10px; background: red; color: white; border: none; padding: 10px; border-radius: 10px;">Yopish</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 3D SAHNANI SOZLASH
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);

        // 3D KO'K YULDUZLAR (PARTICLES)
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 5000; i++) {
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // x
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // y
            vertices.push(THREE.MathUtils.randFloatSpread(2000)); // z
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0x00f2ff, size: 2 });
        const stars = new THREE.Points(geometry, material);
        scene.add(stars);

        camera.position.z = 1;

        function animate3d() {
            requestAnimationFrame(animate3d);
            stars.rotation.y += 0.001;
            stars.rotation.x += 0.0005;
            renderer.render(scene, camera);
        }
        animate3d();

        function startExperience() {
            document.getElementById('bgMusic').play();
            document.getElementById('main-ui').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('main-ui').style.display = 'none';
                document.getElementById('memory-video-box').style.display = 'block';
                document.getElementById('special-video').play();
            }, 500);
        }

        function closeVideo() {
            document.getElementById('memory-video-box').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            document.getElementById('main-ui').style.opacity = '1';
        }

        // Ekran o'zgarganda 3Dni moslashtirish
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
