<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Ulkan 3D Ochiq Dunyo (Open World)</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; background: rgba(0,0,0,0.5); padding: 10px 0; z-index: 100;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px;
            background: white; border-radius: 50%; transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div id="info">Sichqonchani bosing va W,A,S,D tugmalari bilan ulkan tog'larda sayr qiling</div>
    <div id="crosshair"></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // 1. Sahna va Atmosfera
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.005); // Tuman yordamida uzoq masofalar realistik ko'rinadi

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new PointerLockControls(camera, document.body);
    document.body.addEventListener('click', () => controls.lock());

    // 2. Yorug'lik (Quyosh va Osmon nuri)
    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
    hemiLight.position.set(0, 500, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1);
    dirLight.position.set(500, 1000, 500);
    dirLight.castShadow = true;
    dirLight.shadow.camera.top = 200;
    dirLight.shadow.camera.bottom = -200;
    dirLight.shadow.camera.left = -200;
    dirLight.shadow.camera.right = 200;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 2000;
    scene.add(dirLight);

    // 3. Ulkan Tog'li Relef (Procedural Generation)
    const worldSize = 1000;
    const terrainGeo = new THREE.PlaneGeometry(worldSize, worldSize, 150, 150);
    terrainGeo.rotateX(-Math.PI / 2);

    const positions = terrainGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        let x = positions.getX(i);
        let z = positions.getZ(i);
        
        // Matematik funksiyalar yordamida tog' va tekisliklar hosil qilish
        let y = (Math.sin(x * 0.02) * 10) + (Math.cos(z * 0.02) * 10);
        y += (Math.sin(x * 0.005) * 30) + (Math.cos(z * 0.005) * 30); // Katta tog'lar
        
        positions.setY(i, y);
    }
    terrainGeo.computeVertexNormals();

    const terrainMat = new THREE.MeshStandardMaterial({ 
        color: 0x3b5e2b, // To'q yashil
        roughness: 0.8,
        flatShading: true 
    });
    const terrain = new THREE.Mesh(terrainGeo, terrainMat);
    terrain.receiveShadow = true;
    scene.add(terrain);

    // 4. Okean / Dengiz sathi
    const waterGeo = new THREE.PlaneGeometry(worldSize, worldSize);
    const waterMat = new THREE.MeshStandardMaterial({ 
        color: 0x1e90ff, 
        transparent: true, 
        opacity: 0.8,
        roughness: 0.1
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.y = -5; // Suv sathi
    scene.add(water);

    // 5. Dunyoga ob'ektlar (masalan, ulkan qoyalar) tarqatish
    const boxGeo = new THREE.BoxGeometry(4, 10, 4);
    const boxMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
    
    for(let i=0; i<200; i++) {
        const x = (Math.random() - 0.5) * worldSize;
        const z = (Math.random() - 0.5) * worldSize;
        
        // Y o'qini relefning balandligiga moslash
        let y = (Math.sin(x * 0.02) * 10) + (Math.cos(z * 0.02) * 10) + (Math.sin(x * 0.005) * 30) + (Math.cos(z * 0.005) * 30);
        
        if (y > 0) { // Suv ostiga qoya qo'ymaymiz
            const rock = new THREE.Mesh(boxGeo, boxMat);
            rock.position.set(x, y + 5, z);
            rock.castShadow = true;
            rock.rotation.y = Math.random() * Math.PI;
            scene.add(rock);
        }
    }

    // 6. Fizika va Harakat (Kamera yerdan uzilmasligi uchun)
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    let canJump = false;

    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
        if(e.code === 'Space' && canJump) velocity.y += 20; // Sakrash
    });
    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
    });

    const raycaster = new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0, -1, 0), 0, 10);
    camera.position.set(0, 50, 0); // Boshlang'ich balandlik

    let prevTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const time = performance.now();
        const delta = (time - prevTime) / 1000;

        if (controls.isLocked) {
            // Yerni tekshirish (Gravitatsiya)
            raycaster.ray.origin.copy(controls.getObject().position);
            raycaster.ray.origin.y += 1;
            
            const intersections = raycaster.intersectObject(terrain);
            const onObject = intersections.length > 0;

            velocity.x -= velocity.x * 5.0 * delta;
            velocity.z -= velocity.z * 5.0 * delta;
            velocity.y -= 9.8 * 10.0 * delta; // Tortishish kuchi

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            const speed = 100.0;
            if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

            if (onObject === true) {
                velocity.y = Math.max(0, velocity.y);
                canJump = true;
                
                // Kamerani yer sathiga to'g'rilash (Tog'ga chiqqanda tepaga ko'tariladi)
                const groundHeight = intersections[0].point.y;
                if (camera.position.y < groundHeight + 2) {
                    camera.position.y = groundHeight + 2;
                }
            }

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            controls.getObject().position.y += (velocity.y * delta);

            if (controls.getObject().position.y < -4) {
                velocity.y = 0;
                controls.getObject().position.y = -4; // Suv ustida suzish
                canJump = true;
            }
        }

        renderer.render(scene, camera);
        prevTime = time;
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
