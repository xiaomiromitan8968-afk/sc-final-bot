<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_ MALIKOV - Trade Art</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            pointer-events: none; text-shadow: 0 0 10px rgba(0,255,255,0.5);
        }
        .info { font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="ui">
        <div>SESSION: <span id="trend">NEUTRAL</span></div>
        <div class="info">SMC Art Generator v1.0</div>
    </div>
    <canvas id="tradeCanvas"></canvas>

<script>
    const canvas = document.getElementById('tradeCanvas');
    const ctx = canvas.getContext('2d');
    const trendEl = document.getElementById('trend');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let points = [];
    let isPressing = false;
    let priceY = canvas.height / 2;
    let priceX = 0;
    let fibZones = [0.618, 0.786, 0.5]; // OTE (Optimal Trade Entry) zonalari

    class TradeElement {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 'up' yoki 'down'
            this.size = Math.random() * 20 + 5;
            this.opacity = 1;
            this.color = type === 'up' ? `0, 255, 150` : `180, 50, 255`;
        }
        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = `rgb(${this.color})`;
            
            if (this.type === 'up') {
                // Yashil neon chiziqlar
                ctx.strokeStyle = `rgba(${this.color}, ${this.opacity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - 20, this.y + 20);
                ctx.stroke();
            } else {
                // Binafsha tuman (shakllar)
                ctx.fillStyle = `rgba(${this.color}, ${this.opacity * 0.3})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    function generateFibNode(x, y) {
        // Fibonacci zonalarida "Order Block" kristallarini chizish
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(x - 30, y - 30, 60, 60);
        ctx.font = '10px Arial';
        ctx.fillStyle = '#fff';
        ctx.fillText("OB ZONE", x + 35, y);
    }

    function animate() {
        // Ekranni to'liq tozalamaymiz, "iz" qolishi uchun
        ctx.fillStyle = 'rgba(5, 5, 5, 0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (isPressing) {
            priceX += 3;
            let change = (Math.random() - 0.4) * 20; // Narx yuqoriga moyil
            priceY -= change;
            
            let type = change > 0 ? 'up' : 'down';
            trendEl.innerText = type === 'up' ? "BULLISH (BOS)" : "RETRACTION";
            trendEl.style.color = type === 'up' ? "#00ff96" : "#b432ff";

            points.push(new TradeElement(priceX, priceY, type));

            // Fibonacci simulyatsiyasi
            if (Math.random() > 0.98) generateFibNode(priceX, priceY);
        }

        points.forEach((p, i) => {
            p.draw();
            p.opacity -= 0.005;
            if (p.opacity <= 0) points.splice(i, 1);
        });

        // Agar narx ekrandan chiqsa, boshiga qaytadi
        if (priceX > canvas.width) priceX = 0;

        requestAnimationFrame(animate);
    }

    window.addEventListener('touchstart', () => isPressing = true);
    window.addEventListener('touchend', () => isPressing = false);
    // Sichqoncha uchun ham (agar kompyuterda ko'rsangiz)
    window.addEventListener('mousedown', () => isPressing = true);
    window.addEventListener('mouseup', () => isPressing = false);

    animate();
</script>
</body>
</html>
