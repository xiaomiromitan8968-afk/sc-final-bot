<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Yuguruvchi - Mobil versiya</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #111; 
            font-family: sans-serif; 
            touch-action: none; /* Ekranni tasodifan surilib ketishini taqiqlaydi */
            user-select: none;
        }
        #score { 
            position: absolute; 
            top: 30px; 
            width: 100%; 
            text-align: center; 
            color: #fff; 
            font-size: 30px; 
            font-weight: bold; 
            z-index: 10; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none; /* Matn ustiga bosib bo'lmasligi uchun */
        }
        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="score">Ball: 0</div>
    <div id="controls">Boshqarish uchun ekranning o'ng yoki chap yarmiga bosing</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 1. Sahnani tayyorlash
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x111111, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 2. Chiroqlar
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 3. O'yinchi
        const playerGeo = new THREE.BoxGeometry(1, 1, 1);
        const playerMat = new THREE.MeshPhongMaterial({ color: 0x00ffcc });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.y = 0.5;
        scene.add(player);

        // 4. Zamin
        const floorGeo = new THREE.PlaneGeometry(14, 200);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -50;
        scene.add(floor);

        camera.position.set(0, 4, 6);
        camera.lookAt(player.position);

        // 5. To'siqlar yaratish
        let obstacles = [];
        function spawnObstacle() {
            const obsGeo = new THREE.BoxGeometry(1, 1, 1);
            const obsMat = new THREE.MeshPhongMaterial({ color: 0xff3366 });
            const obs = new THREE.Mesh(obsGeo, obsMat);
            
            const lanes = [-4, 0, 4];
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            
            obs.position.set(randomLane, 0.5, -60);
            scene.add(obs);
            obstacles.push(obs);
        }
        setInterval(spawnObstacle, 800);

        // 6. MOBIL Boshqaruv (Touch Event)
        let targetX = 0;
        
        window.addEventListener('touchstart', (e) => {
            const touchX = e.touches[0].clientX;
            const screenWidth = window.innerWidth;
            
            // Ekranning chap tomoniga bosilsa
            if (touchX < screenWidth / 2 && targetX > -4) {
                targetX -= 4;
            } 
            // Ekranning o'ng tomoniga bosilsa
            else if (touchX >= screenWidth / 2 && targetX < 4) {
                targetX += 4;
            }
        });

        // 7. O'yin jarayoni
        let score = 0;
        let isGameOver = false;

        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);

            player.position.x += (targetX - player.position.x) * 0.15;

            obstacles.forEach((obs, index) => {
                obs.position.z += 0.8;

                const dist = player.position.distanceTo(obs.position);
                if (dist < 1.0) {
                    isGameOver = true;
                    setTimeout(() => {
                        alert("O'yin tugadi! Yig'ilgan ball: " + score);
                        location.reload();
                    }, 50);
                }

                if (obs.position.z > 8) {
                    scene.remove(obs);
                    obstacles.splice(index, 1);
                    score += 10;
                    document.getElementById('score').innerText = "Ball: " + score;
                }
            });

            renderer.render(scene, camera);
        }
        animate();

        // Ekran o'lchami o'zgarganda (telefonni buraganda) moslashish
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
