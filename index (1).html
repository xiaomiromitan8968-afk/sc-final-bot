<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC_MALIKOV PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #0d1117; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { display: flex; flex-direction: column; gap: 15px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 15px; cursor: pointer; transition: 0.3s; }
        .card:active { transform: scale(0.98); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .timeframe-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; text-align: center; }
        .signal-card { border-left: 5px solid #238636; background: #1c2128; padding: 20px; border-radius: 12px; }
        .buy { color: #39d353; font-weight: bold; }
        .sell { color: #f85149; font-weight: bold; }
        .price-box { display: flex; justify-content: space-between; margin-top: 10px; font-size: 14px; border-bottom: 1px dashed #30363d; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div id="app" class="container">
        <div id="step-1">
            <h2 style="color: #58a6ff;">Aktivni tanlang</h2>
            <div class="card" onclick="selectAsset('XAUUSD')">🟡 GOLD (XAU)</div>
            <div class="card" onclick="selectAsset('BTCUSDT')" style="margin-top:10px;">🚀 BTC / USDT</div>
        </div>

        <div id="step-2" style="display:none;">
            <h2 id="selected-asset-title"></h2>
            <p>Taymfreymni tanlang:</p>
            <div class="btn-grid">
                <div class="timeframe-btn" onclick="generateSignal('M5')">5M</div>
                <div class="timeframe-btn" onclick="generateSignal('M15')">15M</div>
                <div class="timeframe-btn" onclick="generateSignal('H1')">1H</div>
            </div>
            <button onclick="reset()" style="margin-top:20px; background:none; color:#8b949e; border:none;">← Orqaga</button>
        </div>

        <div id="step-3" style="display:none;">
            <div class="signal-card">
                <h3 id="signal-type"></h3>
                <div class="price-box"><span>Entry:</span> <b id="entry-price"></b></div>
                <div class="price-box"><span>Take Profit (1.618):</span> <b id="tp-price" class="buy"></b></div>
                <div class="price-box"><span>Stop Loss:</span> <b id="sl-price" class="sell"></b></div>
                <p style="font-size: 10px; color: #8b949e; margin-top: 15px;">*Smart Money & Fibo 1.618 strategiyasi asosida hisoblandi.</p>
            </div>
            <button onclick="reset()" style="margin-top:20px; width:100%; padding:10px; border-radius:8px; background:#238636; color:white; border:none;">Yangi tahlil</button>
        </div>
    </div>

    <script>
        let selectedAsset = '';
        const tg = window.Telegram.WebApp;
        tg.expand();

        function selectAsset(asset) {
            selectedAsset = asset;
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
            document.getElementById('selected-asset-title').innerText = asset;
        }

        function generateSignal(tf) {
            // Haqiqiy tahlil o'rniga hozircha simulyatsiya (Siz buni API bilan bog'lashingiz mumkin)
            const mockPrices = { 'XAUUSD': 2350.50, 'BTCUSDT': 65400 };
            let basePrice = mockPrices[selectedAsset] || 100;
            
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'block';
            // Strategiya: Tasodifiy Buy yoki Sell (Siz buni tahlilga bog'laysiz)
            const isBuy = Math.random() > 0.5;
            document.getElementById('signal-type').innerText = isBuy ? "🚀 BUY SIGNAL" : "📉 SELL SIGNAL";
            document.getElementById('signal-type').className = isBuy ? "buy" : "sell";

            // Fibo 1.618 hisob-kitobi (shunchaki misol)
            document.getElementById('entry-price').innerText = basePrice.toFixed(2);
            document.getElementById('tp-price').innerText = isBuy ? (basePrice * 1.016).toFixed(2) : (basePrice * 0.984).toFixed(2);
            document.getElementById('sl-price').innerText = isBuy ? (basePrice * 0.995).toFixed(2) : (basePrice * 1.005).toFixed(2);
        }

        function reset() {
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            document.getElementById('step-3').style.display = 'none';
        }
    </script>
</body>
</html>
